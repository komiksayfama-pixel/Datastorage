<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOX-REX-VİP-SORGU-API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #ccc;
            font-size: 1.1em;
        }

        .status-badge {
            display: inline-block;
            background: #00ff88;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-top: 10px;
            font-weight: bold;
        }

        /* API Grid */
        .api-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* API Kartları */
        .api-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .api-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: #ff6b6b;
        }

        .api-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }

        .api-name {
            font-size: 1.3em;
            font-weight: bold;
        }

        .api-method {
            background: #ff6b6b;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: bold;
        }

        .api-url {
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.75em;
            margin: 10px 0;
            word-break: break-all;
            color: #ffd93d;
        }

        .input-group {
            margin: 15px 0;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            color: #aaa;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-size: 0.9em;
        }

        .input-group input:focus {
            outline: none;
            background: rgba(255,255,255,0.25);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8em;
            max-height: 200px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .result.loading {
            color: #ffd93d;
        }

        .result.error {
            color: #ff6b6b;
        }

        .result.success {
            color: #00ff88;
        }

        /* Admin Panel */
        .admin-panel {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
        }

        .admin-header {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #ffd93d;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #ff6b6b;
        }

        .stat-label {
            font-size: 0.8em;
            color: #aaa;
        }

        .admin-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .admin-btn {
            flex: 1;
            min-width: 120px;
            background: rgba(255,255,255,0.2);
        }

        .admin-btn.danger {
            background: linear-gradient(45deg, #ff4444, #cc0000);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 0.8em;
        }

        @media (max-width: 768px) {
            .api-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔥 DOX-REX-VİP-SORGU-API</h1>
            <p>JavaScript Korumalı API'leri Aşan En Güçlü Sistem</p>
            <div class="status-badge" id="apiStatus">✅ 11 API Aktif</div>
        </div>

        <!-- API Grid -->
        <div class="api-grid" id="apiGrid"></div>

        <!-- Admin Panel -->
        <div class="admin-panel">
            <div class="admin-header">⚙️ ADMIN PANEL</div>
            <div class="admin-stats" id="adminStats">
                <div class="stat-card">
                    <div class="stat-number" id="totalQueries">0</div>
                    <div class="stat-label">Toplam Sorgu</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="activeUsers">0</div>
                    <div class="stat-label">Aktif Kullanıcı</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="successRate">0%</div>
                    <div class="stat-label">Başarı Oranı</div>
                </div>
            </div>
            <div class="admin-buttons">
                <button class="admin-btn" onclick="exportLogs()">📥 Logları İndir</button>
                <button class="admin-btn" onclick="clearLogs()">🗑 Logları Temizle</button>
                <button class="admin-btn danger" onclick="resetAll()">🔄 Sıfırla</button>
            </div>
        </div>

        <div class="footer">
            DOX-REX-VİP-SORGU-BOT | © 2024 Tüm Hakları Saklıdır | @doxbimyetkili
        </div>
    </div>

    <script>
        // ================= API KONFİGÜRASYONU =================
        // HER API KENDİ ENDPOINT'İNE BAĞLI - BİRLEŞTİRME YOK
        
        const API_LIST = [
            {
                id: 'tc',
                name: '🔍 TC Sorgu',
                endpoint: '/api/tc',
                params: [{ name: 'tc', label: 'TC Kimlik No', type: 'text', placeholder: '11 haneli TC' }],
                method: 'GET'
            },
            {
                id: 'gsm',
                name: '📞 GSM Sorgu',
                endpoint: '/api/gsm',
                params: [{ name: 'gsm', label: 'GSM Numarası', type: 'text', placeholder: '5XXXXXXXXXX' }],
                method: 'GET'
            },
            {
                id: 'adres',
                name: '🏠 Adres Sorgu',
                endpoint: '/api/adres',
                params: [{ name: 'tc', label: 'TC Kimlik No', type: 'text', placeholder: '11 haneli TC' }],
                method: 'GET'
            },
            {
                id: 'aile',
                name: '👨‍👩‍👧 Aile Sorgu',
                endpoint: '/api/aile',
                params: [{ name: 'tc', label: 'TC Kimlik No', type: 'text', placeholder: '11 haneli TC' }],
                method: 'GET'
            },
            {
                id: 'sulale',
                name: '🌳 Sülasle Sorgu',
                endpoint: '/api/sulale',
                params: [{ name: 'tc', label: 'TC Kimlik No', type: 'text', placeholder: '11 haneli TC' }],
                method: 'GET'
            },
            {
                id: 'limitsiz',
                name: '🚀 Limitsiz Sorgu',
                endpoint: '/api/limitsiz',
                params: [{ name: 'tc', label: 'TC Kimlik No', type: 'text', placeholder: '11 haneli TC' }],
                method: 'GET'
            },
            {
                id: 'cc',
                name: '💳 CC Sorgu',
                endpoint: '/api/cc',
                params: [{ name: 'bin', label: 'BIN Kodu', type: 'text', placeholder: 'İlk 6 hane' }],
                method: 'GET'
            },
            {
                id: 'bin',
                name: '🏦 BIN Sorgu',
                endpoint: '/api/bin',
                params: [{ name: 'bin', label: 'BIN Kodu', type: 'text', placeholder: 'İlk 6 hane' }],
                method: 'GET'
            },
            {
                id: 'ip',
                name: '🌐 IP Sorgu',
                endpoint: '/api/ip',
                params: [{ name: 'ip', label: 'IP Adresi', type: 'text', placeholder: '8.8.8.8' }],
                method: 'GET'
            },
            {
                id: 'adsoyad',
                name: '👤 Ad-Soyad Sorgu',
                endpoint: '/api/adsoyad',
                params: [
                    { name: 'adi', label: 'Ad', type: 'text', placeholder: 'Ahmet' },
                    { name: 'soyadi', label: 'Soyad', type: 'text', placeholder: 'Yılmaz' }
                ],
                method: 'GET'
            },
            {
                id: 'tcgsm',
                name: '📱 TC-GSM Sorgu',
                endpoint: '/api/tcgsm',
                params: [{ name: 'tc', label: 'TC Kimlik No', type: 'text', placeholder: '11 haneli TC' }],
                method: 'GET'
            }
        ];

        // LocalStorage için
        let queryLogs = JSON.parse(localStorage.getItem('queryLogs') || '[]');
        let totalQueries = queryLogs.length;

        // ================= API İSTEK FONKSİYONU =================
        async function callAPI(apiId, params) {
            const resultDiv = document.getElementById(`result-${apiId}`);
            resultDiv.innerHTML = '⏳ Sorgulanıyor... (JavaScript koruması aşılıyor)';
            resultDiv.className = 'result loading';
            
            try {
                // URL oluştur
                let url = `/api/${apiId}`;
                const queryParams = new URLSearchParams();
                
                for (const [key, value] of Object.entries(params)) {
                    if (value) queryParams.append(key, value);
                }
                
                if (queryParams.toString()) {
                    url += '?' + queryParams.toString();
                }
                
                // İsteği yap
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'User-Agent': 'Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)'
                    }
                });
                
                const data = await response.json();
                
                // Log kaydet
                queryLogs.unshift({
                    id: apiId,
                    params: params,
                    result: data,
                    timestamp: new Date().toISOString()
                });
                
                // Son 100 log tut
                if (queryLogs.length > 100) queryLogs.pop();
                localStorage.setItem('queryLogs', JSON.stringify(queryLogs));
                
                // İstatistik güncelle
                totalQueries = queryLogs.length;
                document.getElementById('totalQueries').innerText = totalQueries;
                document.getElementById('activeUsers').innerText = Math.floor(Math.random() * 50) + 10;
                
                // Sonucu göster
                resultDiv.innerHTML = JSON.stringify(data, null, 2);
                resultDiv.className = 'result success';
                
            } catch (error) {
                resultDiv.innerHTML = `❌ Hata: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }

        // ================= API KARTLARINI OLUŞTUR =================
        function createAPICards() {
            const grid = document.getElementById('apiGrid');
            grid.innerHTML = '';
            
            API_LIST.forEach(api => {
                const card = document.createElement('div');
                card.className = 'api-card';
                
                // Input alanlarını oluştur
                let inputsHtml = '';
                api.params.forEach(param => {
                    inputsHtml += `
                        <div class="input-group">
                            <label>${param.label}</label>
                            <input type="${param.type}" id="${api.id}_${param.name}" placeholder="${param.placeholder}">
                        </div>
                    `;
                });
                
                card.innerHTML = `
                    <div class="api-header">
                        <span class="api-name">${api.name}</span>
                        <span class="api-method">${api.method}</span>
                    </div>
                    <div class="api-url">${api.endpoint}</div>
                    ${inputsHtml}
                    <button onclick="executeQuery('${api.id}', ${JSON.stringify(api.params.map(p => p.name))})">
                        🔍 Sorgula
                    </button>
                    <div class="result" id="result-${api.id}">Sorgu bekleniyor...</div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        // Sorgu çalıştır
        window.executeQuery = function(apiId, paramNames) {
            const params = {};
            paramNames.forEach(name => {
                const input = document.getElementById(`${apiId}_${name}`);
                if (input) params[name] = input.value;
            });
            callAPI(apiId, params);
        };
        
        // Admin fonksiyonları
        window.exportLogs = function() {
            const dataStr = JSON.stringify(queryLogs, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = `sorgu_loglari_${new Date().toISOString()}.json`;
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        };
        
        window.clearLogs = function() {
            if (confirm('Tüm loglar silinecek. Devam etmek istediğinize emin misiniz?')) {
                queryLogs = [];
                localStorage.setItem('queryLogs', JSON.stringify(queryLogs));
                totalQueries = 0;
                document.getElementById('totalQueries').innerText = '0';
                alert('✅ Loglar temizlendi!');
            }
        };
        
        window.resetAll = function() {
            if (confirm('TÜM VERİLER SİLİNECEK! (Loglar, istatistikler) Devam?')) {
                localStorage.clear();
                queryLogs = [];
                totalQueries = 0;
                document.getElementById('totalQueries').innerText = '0';
                document.getElementById('activeUsers').innerText = '0';
                document.getElementById('successRate').innerText = '0%';
                
                // Tüm result alanlarını temizle
                API_LIST.forEach(api => {
                    const resultDiv = document.getElementById(`result-${api.id}`);
                    if (resultDiv) {
                        resultDiv.innerHTML = 'Sorgu bekleniyor...';
                        resultDiv.className = 'result';
                    }
                });
                alert('✅ Tüm veriler sıfırlandı!');
            }
        };
        
        // İstatistikleri güncelle
        function updateStats() {
            document.getElementById('totalQueries').innerText = totalQueries;
            const successCount = queryLogs.filter(log => log.result && !log.result.error).length;
            const successRate = totalQueries > 0 ? Math.round((successCount / totalQueries) * 100) : 0;
            document.getElementById('successRate').innerText = `${successRate}%`;
        }
        
        // Sayfa yüklendiğinde
        document.addEventListener('DOMContentLoaded', () => {
            createAPICards();
            updateStats();
            
            // Her 10 saniyede bir istatistikleri güncelle
            setInterval(updateStats, 10000);
        });
    </script>
</body>
</html>
